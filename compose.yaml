# Host Campfire on a server (e.g. sleepycore) reachable from any browser on the LAN.
#   docker compose up -d --build
#
# Then open:
#   http://<server-ip>:8091          (app — all pages except the mic tuner)
#   https://<server-ip>:8443         (tuner works here — accept the one-time cert warning)
#
# Ports already in use on sleepycore: 8080 (SleepyBirds), 8090 (BirdNET-Go) — so this
# uses 8091. If you front it with Nginx Proxy Manager, NPM terminates HTTPS for the
# tuner and you just point it at host port 8091.
services:
  guitarhero:
    build: .
    image: guitarhero:latest
    container_name: guitarhero
    ports:
      - "8091:80"    # HTTP  (host 8091 -> container 80)
      - "8443:443"   # HTTPS (self-signed; only needed for direct-IP access, not via NPM)
    environment:
      # Name baked into the self-signed cert. Set to your host if you use mDNS.
      - TLS_CN=sleepycore.local
    volumes:
      # Persist the generated cert so you don't get a new warning on every restart.
      - guitarhero_certs:/etc/nginx/certs
    restart: unless-stopped

volumes:
  guitarhero_certs:
