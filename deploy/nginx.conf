# HTTP — fine for everything except the mic tuner.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    # No build step / no content hashes, so make browsers revalidate every load.
    # nginx answers 304 when unchanged, so a `git pull` + rebuild takes effect immediately
    # instead of returning visitors getting stale cached JS modules.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# HTTPS — required so the tuner can use getUserMedia (microphone) over the LAN.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    # No build step / no content hashes, so make browsers revalidate every load.
    # nginx answers 304 when unchanged, so a `git pull` + rebuild takes effect immediately
    # instead of returning visitors getting stale cached JS modules.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
